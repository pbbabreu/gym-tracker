// ║  3. APPLICATION STATE
// ║  All mutable state lives here. Nothing outside this section should

// ║
// ║  D  = persisted data (saved to localStorage + Gist)

// Persisted data — written to storage on every mutation

  plans:        [],  // training plans:  { id, name, exercises:[exId,...] }
  sessions:     [],  // history:         { id, date, planId, planName, exercises:[...] }

// ╔══════════════════════════════════════════════════════════════════════════════
// ║  5. STORAGE — localStorage · window.storage · GitHub Gist
// ║
// ║  Three-layer storage strategy:
// ║    1. localStorage  — fast, survives refresh, works on GitHub Pages
// ║    2. window.storage — Claude artifact fallback
// ║    3. GitHub Gist  — cross-device sync source of truth
// ║
// ║  Read order: localStorage → window.storage → Gist
// ║  Write order: localStorage + window.storage (sync) → Gist (async, fire-and-forget)
// ║
// ║  Config (token, gistId) is stored separately from data and never exported.
// ╚══════════════════════════════════════════════════════════════════════════════

// Safe localStorage wrapper — returns null instead of throwing in sandboxed envs
const LS = {
  get(k)    { try { return localStorage.getItem(k); }    catch(e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); }       catch(e) {} },
  del(k)    { try { localStorage.removeItem(k); }        catch(e) {} },
};

// ── Config (token + gistId) ───────────────────────────────────────────────────

async function loadConfig() {
  try {
    const raw = LS.get('gym:config');
    if (raw) { const c = JSON.parse(raw); CFG.token = c.token||''; CFG.gistId = c.gistId||''; return; }
    const r = await window.storage.get('gym:config');
    if (r?.value) { const c = JSON.parse(r.value); CFG.token = c.token||''; CFG.gistId = c.gistId||''; }
  } catch(e) {}
}

async function saveConfig() {
  const s = JSON.stringify(CFG);
  LS.set('gym:config', s);
  try { await window.storage.set('gym:config', s); } catch(e) {}
}

// ── Data (exercises, plans, sessions, memory, weights) ────────────────────────

async function loadLocalData() {
  try { const raw = LS.get('gym:data'); if (raw) return JSON.parse(raw); } catch(e) {}
  try { const r = await window.storage.get('gym:data'); if (r?.value) return JSON.parse(r.value); } catch(e) {}
  return null;
}

async function persistLocal() {
  const s = JSON.stringify(D);
  LS.set('gym:data', s);
  try { await window.storage.set('gym:data', s); } catch(e) {}
}

// persist() is called after every mutation — saves locally and kicks off Gist sync
async function persist() {
  D.lastModified = Date.now();
  await persistLocal();
  gistSave(); // fire-and-forget — keeps UI snappy
}

function applyData(p) {
  D.exercises    = p.exercises    || [];
  D.plans        = p.plans        || [];
  D.sessions     = p.sessions     || [];
  D.memory       = p.memory       || {};
  D.weights      = p.weights      || [];
  D.lastModified = p.lastModified || 0;
  rebuildMemory();
}

// ── GitHub Gist sync ──────────────────────────────────────────────────────────

async function gistFetch() {
  if (!CFG.token || !CFG.gistId) return null;
  try {
    const r = await fetch(`https://api.github.com/gists/${CFG.gistId}`, {
      headers: { Authorization: `token ${CFG.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) return null;
    const g = await r.json();
    const content = g.files?.['gym-tracker.json']?.content;
    return content ? JSON.parse(content) : null;
  } catch(e) { return null; }
}

async function gistSave() {
  if (!CFG.token) return;
  setSyncStatus('syncing');
  const content = JSON.stringify(D, null, 2);
  try {
    if (CFG.gistId) {
      const r = await fetch(`https://api.github.com/gists/${CFG.gistId}`, {
        method: 'PATCH',
        headers: { Authorization: `token ${CFG.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { 'gym-tracker.json': { content } } })
      });
      if (!r.ok) throw new Error();
    } else {
      const r = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { Authorization: `token ${CFG.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description:'Gym Tracker Data', public:false, files:{'gym-tracker.json':{content}} })
      });
      if (!r.ok) throw new Error();
      const g = await r.json();
      CFG.gistId = g.id;
      await saveConfig();
    }
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

// Force-pull from Gist — called from the sync modal "Forçar download" button
async function gistPull() {
  if (!CFG.token) { alert('Configure o token do GitHub primeiro.'); return; }
  setSyncStatus('syncing');
  const remote = await gistFetch();
  if (!remote) { setSyncStatus('error'); return; }
  applyData(remote);
  await persistLocal();
  setSyncStatus('ok');
  render();
}

// ── Load sequence ─────────────────────────────────────────────────────────────
// 1. Load config (token, gistId)
// 2. Load local data → render immediately so the app is usable
// 3. Fetch Gist in background → merge → re-render if anything changed

async function loadData() {
  await loadConfig();

  const local = await loadLocalData();
  if (local) applyData(local);
  else rebuildMemory();
  render();

  if (!CFG.token || !CFG.gistId) return;

  setSyncStatus('syncing');
  const remote = await gistFetch();

  if (!remote) { setSyncStatus('error'); return; }

  // Conflict resolution: newer lastModified wins for sessions/weights
  const localTs  = local?.lastModified || 0;
  const remoteTs = remote.lastModified || 0;
  const base = remoteTs >= localTs ? remote : (local || remote);

  // Library and plans are always unioned — never lose entries from either device
  const exMap = new Map();
  (local?.exercises||[]).forEach(e => exMap.set(e.id, e));
  (remote.exercises||[]).forEach(e => exMap.set(e.id, e)); // remote wins on conflict
  base.exercises = [...exMap.values()];

  const plMap = new Map();
  (local?.plans||[]).forEach(p => plMap.set(p.id, p));
  (remote.plans||[]).forEach(p => plMap.set(p.id, p));
  base.plans = [...plMap.values()];

  applyData(base);
  await persistLocal();
  gistSave(); // push merged result back so both devices converge
  render();
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  6. MEMORY SYSTEM
// ║
// ║  Tracks the last work sets for each unique exercise+type+regime combination.
// ║  Key format: "exId:type:regime"  e.g. "abc123:strength:weighted"
// ║
// ║  rebuildMemory()       — scans all sessions, rebuilds D.memory from scratch
// ║  buildSetsFromMemory() — generates pre-populated set rows for a session exercise
// ║
// ║  Warm-up generation rules:
// ║    Compound + weighted  → 3 WU sets at 25 / 55 / 85% of heaviest work set
// ║    Compound + assisted  → 3 WU sets at 175 / 145 / 115% (more assist = easier)
// ║    Isolation + weighted → 1 WU set at 50% of heaviest work set
// ║    Bodyweight           → no warm-ups
// ╚══════════════════════════════════════════════════════════════════════════════

const memKey = (exId, type, regime) => `${exId}:${type}:${regime||'weighted'}`;

function rebuildMemory() {
  const mem = {};
  [...D.sessions]
    .sort((a,b) => a.date.localeCompare(b.date)) // process oldest first so newest wins
    .forEach(sess => {
      (sess.exercises||[]).forEach(ex => {
        const key = memKey(ex.exId, ex.type, ex.regime||'weighted');
        const ws = (ex.sets||[]).filter(s => s.intent==='work' && (s.reps||s.kg));
        if (ws.length) mem[key] = { date: sess.date, workSets: ws.map(s => ({reps:s.reps, kg:s.kg})) };
      });
    });
  D.memory = mem;
}

function buildSetsFromMemory(ex) {
  const key    = memKey(ex.exId, ex.type, ex.regime||'weighted');
  const mem    = D.memory[key];
  const regime = ex.regime || 'weighted';
  const isComp = ex.compound !== false;
  const sets   = [];

  // No memory → return empty default rows based on type
  if (!mem) {
    const count = ex.type === 'strength' ? 3 : 2;
    const ph    = ex.type === 'strength' ? '2–5' : regime === 'assisted' ? '6–12' : '6–10';
    for (let i=0; i<count; i++) sets.push({ intent:'work', reps:'', kg:'', refReps:null, refKg:null, phReps:ph });
    return sets;
  }

  const ws = mem.workSets || [];

  // Find base weight for warm-up calculation (heaviest = hardest)
  const vals = ws.map(s => Number(s.kg)).filter(v => v > 0);
  let baseKg = null;
  if (vals.length) baseKg = regime === 'assisted' ? Math.min(...vals) : Math.max(...vals);

  // Generate warm-up sets
  if (regime !== 'bodyweight' && baseKg != null) {
    const mults = isComp
      ? (regime === 'assisted' ? [1.75, 1.45, 1.15] : [0.25, 0.55, 0.85])
      : [0.5];
    mults.forEach(m => sets.push({ intent:'warmup', reps:'', kg:round(baseKg*m, 0.5), refReps:null, refKg:null }));
  }

  // Replicate last work sets with reference values (shown as ghost text)
  ws.forEach(s => sets.push({ intent:'work', reps:s.reps, kg:s.kg, refReps:s.reps, refKg:s.kg }));
  return sets;
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  7. BODYWEIGHT & VOLUME HELPERS
// ║
// ║  Bodyweight is used in two ways:
// ║    · Bodyweight exercises: actual load = BW (no input needed)
// ║    · Assisted exercises:   actual load = BW − counterweight
// ║
// ║  Volume is calculated using actual load, not entered kg.
// ╚══════════════════════════════════════════════════════════════════════════════

function currentBW() {
  if (!D.weights?.length) return null;
  return [...D.weights].sort((a,b) => b.date.localeCompare(a.date))[0].kg;
}

function bwIsStale() {
  if (!D.weights?.length) return true;
  const last = [...D.weights].sort((a,b) => b.date.localeCompare(a.date))[0].date;
  return (new Date(today()) - new Date(last)) / 86400000 > 7;
}

function actualLoad(set, regime) {
  const bw = currentBW();
  if (regime === 'bodyweight') return bw || null;
  if (regime === 'assisted')   return (bw && set.kg) ? Math.max(0, bw - Number(set.kg)) : null;
  return set.kg ? Number(set.kg) : null;
}

function volEx(sets, regime) {
  return (sets||[])
    .filter(s => s.intent === 'work')
    .reduce((a,s) => {
      const l = actualLoad(s, regime||'weighted');
      return a + (l && s.reps ? Number(s.reps)*l : 0);
    }, 0);
}

// ╔══════════════════════════════════════════════════════════════════════════════
// ║  9. FILTER SYSTEM
// ║
// ║  applyFilters() — pure filter function, used by library, add-ex modal, plan editor
// ║
// ║  Filter bars are built as HTML strings with data-* attributes.
// ║  Listeners are attached programmatically after injection (avoids onclick
// ║  attribute CSP issues in sandboxed environments).
// ╚══════════════════════════════════════════════════════════════════════════════

function applyFilters(list, fType, fMove, search, alpha, unclassed) {
  let out = list.filter(ex => {
    if (fType === 'strength'    && ex.type !== 'strength')    return false;
    if (fType === 'hypertrophy' && ex.type !== 'hypertrophy') return false;
    if (unclassed) { if (ex.compound != null) return false; }
    else {
      if (fMove === 'compound'  && ex.compound !== true)  return false;
      if (fMove === 'isolation' && ex.compound !== false) return false;
    }
    if (search && !ex.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  if (alpha) out = [...out].sort((a,b) => a.name.localeCompare(b.name,'pt'));
  return out;
}

// Builds a filter pill bar HTML string.
// Each pill carries a data-key attribute so listeners can be attached externally.
function filterBarHTML(fType, fMove, unclassed, showUnclassed) {
  const p = (lbl, active, key, acBg) =>
    `<button data-fk="${key}" style="padding:6px 13px;border-radius:99px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;background:${active?(acBg||CG):BG3};color:${active?TX:DM}">${lbl}</button>`;
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
    ${p('Força',        fType==='strength',              'ft:strength')}
    ${p('Hipert.',      fType==='hypertrophy',            'ft:hypertrophy')}
    <div style="width:1px;background:${BD};margin:0 2px"></div>
    ${p('Composto',     !unclassed&&fMove==='compound',  'fm:compound',  '#1a1035')}
    ${p('Isolado',      !unclassed&&fMove==='isolation', 'fm:isolation', '#1e1810')}
    ${showUnclassed ? p('Não classif.', unclassed, 'fm:unclassed', '#2a2a1a') : ''}
  </div>`;
}

// Attaches click listeners to a rendered filter bar.
// onType(val) and onMove(val) are callbacks that handle state changes.
function bindFilterBar(containerId, onType, onMove) {
  const bar = document.getElementById(containerId);
  if (!bar) return;
  bar.querySelectorAll('[data-fk]').forEach(btn => {
    btn.addEventListener('click', function() {
      const [ns, val] = this.dataset.fk.split(':');
      if (ns === 'ft') onType(val);
      else             onMove(val);
    });
  });
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  10. RENDER ENGINE
// ║
// ║  render() rebuilds the entire page from state.
// ║  Each tab is a separate function (sections 11–15).
// ║  After render, programmatic listeners are re-attached where needed.
// ╚══════════════════════════════════════════════════════════════════════════════

function render() {
  document.getElementById('root').innerHTML = buildPage();
  // Re-attach listeners that can't use onclick attributes
  bindLibraryFilters();
  updateSyncDot();
}

function buildPage() {
  const TABS = [['log','Treino'],['history','Histórico'],['library','Biblioteca'],['plans','Planos'],['weight','Peso']];
  const tabBar = `
    <div style="position:sticky;top:0;z-index:50;background:${BG};border-bottom:1px solid ${BD};display:flex;position:relative">
      ${TABS.map(([id,lbl]) => `
        <button onclick="setTab('${id}')" style="flex:1;padding:12px 2px;background:none;border:none;
          border-bottom:2px solid ${TAB===id?CG:'transparent'};color:${TAB===id?TX:DM};
          font-weight:600;font-size:11px;cursor:pointer;font-family:inherit">${lbl}</button>
      `).join('')}
      <div id="sync-dot" style="width:7px;height:7px;border-radius:99px;background:transparent;
        position:absolute;top:10px;right:10px;transition:background .3s"></div>
    </div>`;
  const body = TAB==='log'     ? buildLog()
             : TAB==='history' ? buildHistory()
             : TAB==='library' ? buildLibrary()
             : TAB==='plans'   ? buildPlans()
             :                   buildWeight();
  return `<div style="min-height:100vh">${tabBar}<div style="padding:16px">${body}</div></div>`;
}

function setTab(t) {
  if (t === 'library') _libSearch = ''; // clear search when entering library
  TAB = t;
  render();
}

// Sync status dot — green=ok, red=error, yellow=syncing
function setSyncStatus(state) { _syncStatus = { state, time: Date.now() }; updateSyncDot(); }
function updateSyncDot() {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  const s = _syncStatus?.state;
  el.style.background = s==='ok' ? CG : s==='error' ? CR : s==='syncing' ? '#e6c84a' : 'transparent';
  el.title = s==='ok' ? `Sincronizado · ${fmtTime(_syncStatus.time)}` : s==='error' ? 'Erro de sincronização' : s==='syncing' ? 'Sincronizando...' : '';
}

// BW stale banner — shown on Log tab when weight hasn't been logged in 7+ days
function bwBanner() {
  if (!bwIsStale()) return '';
  const msg = !D.weights?.length
    ? 'Nenhum peso corporal registrado — necessário para cálculos de carga.'
    : 'Peso corporal não atualizado há mais de 7 dias.';
  return `<div style="background:#1e1a00;border:1px solid #5a4a00;border-radius:10px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px">
    <span style="font-size:13px;color:#e6c84a;flex:1">${msg}</span>
    ${Bs(CG,TX,'+ Peso',"setTab('weight')")}
  </div>`;
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  11. TAB: LOG (Treino)
// ║
// ║  Two states:
// ║    · No active session → plan picker + "free workout" button
// ║    · Active session    → exercise blocks with set rows
// ║
// ║  Exercise block contains: name, type toggle, regime toggle, set rows
// ║  Set row contains: W/WU toggle, reps input, kg input, reference chip, remove
// ╚══════════════════════════════════════════════════════════════════════════════

function buildLog() {
  if (!S) return buildLogStartScreen();
  return buildLogSession();
}

function buildLogStartScreen() {
  let plans = '';
  if (D.plans.length) {
    plans = `<div style="font-size:11px;font-weight:700;color:${DM};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Escolher plano</div>`;
    plans += D.plans.map(p => `
      <button onclick="startPlan('${p.id}')" style="display:flex;align-items:center;justify-content:space-between;
        padding:13px 16px;background:${BG2};border:1px solid ${BD};border-radius:10px;cursor:pointer;
        width:100%;margin-bottom:8px;color:${TX};font-family:inherit">
        <span style="font-weight:600">${esc(p.name)}</span>
        <span style="color:${DM};font-size:13px">${(p.exercises||[]).length} exerc.</span>
      </button>`).join('');
    plans += `<div style="height:1px;background:${BD};margin:14px 0"></div>`;
  }
  return `
    ${bwBanner()}
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Treinar</div>
    <div style="color:${DM};font-size:13px;margin-bottom:20px">${fmt(today())}</div>
    ${plans}
    ${B(CG,TX,'+ Treino livre','startFree()',';margin-bottom:0')}
    ${!D.plans.length ? `<div style="text-align:center;color:${DM};padding:32px 0;font-size:14px;line-height:1.6">Crie um plano ou comece um treino livre.</div>` : ''}`;
}

function buildLogSession() {
  const isEdit = !!S._editId;
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:17px;margin-bottom:4px">${esc(S.planName||(isEdit?'Editar treino':'Treino livre'))}</div>
        <input type="date" value="${S.date}" onchange="S.date=this.value"
          style="background:${BG3};border:1px solid ${BD};border-radius:7px;color:${TX};font-size:13px;padding:6px 10px;outline:none;width:auto">
      </div>
      ${Bs(BG3,TX,'Cancelar','cancelSession()',';margin-left:8px;flex-shrink:0')}
    </div>
    ${S.exercises.map((ex,i) => buildExBlock(ex,i)).join('')}
    ${B(BG3,TX,'+ Exercício','openAddEx()')}
    ${B(S.exercises.length?CG:'#333',TX,isEdit?'Salvar alterações':'Salvar treino','saveSession()',';margin-bottom:0')}`;
}

function buildExBlock(ex, i) {
  const isS  = ex.type==='strength', isH=ex.type==='hypertrophy';
  const isW  = ex.regime==='weighted', isAs=ex.regime==='assisted', isBW=ex.regime==='bodyweight';
  const isFirst = i===0, isLast=i===S.exercises.length-1;
  const bw = currentBW();

  const setHeader = ex.sets.length ? `
    <div style="display:grid;grid-template-columns:54px 1fr 1fr 38px;gap:6px;margin-bottom:6px">
      <span style="font-size:11px;color:${DM};text-align:center">Tipo</span>
      <span style="font-size:11px;color:${DM};text-align:center">Reps</span>
      <span style="font-size:11px;color:${DM};text-align:center">${isAs?'Assist.':isBW?'BW':'Kg'}</span>
      <span></span>
    </div>` : '';

  const setRows = ex.sets.map((s,j) => {
    const isWork = s.intent === 'work';
    const rv = (s.reps===''||s.reps==null) ? '' : s.reps;
    const kv = (s.kg===''  ||s.kg==null)   ? '' : s.kg;

    // Reference chip — shows last session's value above the inputs
    let refLabel = '';
    if (isWork && (s.refReps!=null||s.refKg!=null)) {
      if (isAs && bw && s.refKg!=null)
        refLabel = `${s.refReps||'–'} × ${s.refKg} assist. (${Math.max(0,bw-Number(s.refKg))}kg real)`;
      else if (isBW && bw)
        refLabel = `${s.refReps||'–'} × ${bw}kg (BW)`;
      else
        refLabel = `${s.refReps!=null?s.refReps:'–'} × ${s.refKg!=null?s.refKg:'–'} ${isAs?'assist.':'kg'}`;
    }
    const refChip = refLabel
      ? `<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;padding:0 2px">
           <span style="font-size:11px;color:${DM}">↺</span>
           <span style="font-size:11px;color:${DM}">${refLabel}</span>
         </div>`
      : '';

    return `<div style="margin-bottom:8px">
      ${refChip}
      <div style="display:grid;grid-template-columns:54px 1fr 1fr 38px;gap:6px;align-items:center">
        <button onclick="toggleIntent(${i},${j})" style="padding:10px 0;border:none;border-radius:7px;
          background:${isWork?CG:'#555'};color:#fff;font-weight:700;font-size:11px;cursor:pointer;
          font-family:inherit;text-align:center;width:100%">${isWork?'W':'WU'}</button>
        <input type="number" inputmode="decimal" placeholder="${s.phReps||'Reps'}" value="${rv}"
          oninput="setVal(${i},${j},'reps',this.value)"
          style="background:${BG3};border:1px solid ${BD};border-radius:7px;color:${TX};font-size:15px;padding:10px 4px;text-align:center;outline:none;width:100%;box-sizing:border-box">
        ${isBW
          ? `<div style="text-align:center;font-size:12px;color:${DM};padding:4px">${bw?bw+'kg':'BW'}</div>`
          : `<input type="number" inputmode="decimal" placeholder="${isAs?'Assist.':'Kg'}" step="0.5" value="${kv}"
               oninput="setVal(${i},${j},'kg',this.value)"
               style="background:${BG3};border:1px solid ${isAs?CA:BD};border-radius:7px;color:${TX};font-size:15px;padding:10px 4px;text-align:center;outline:none;width:100%;box-sizing:border-box">`}
        <button onclick="rmSet(${i},${j})" style="background:none;border:none;color:${DM};font-size:22px;cursor:pointer;padding:4px;line-height:1;text-align:center;width:100%">×</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="background:${BG2};border:1px solid ${BD};border-radius:10px;margin-bottom:12px;overflow:hidden">
      <!-- Exercise header: reorder arrows, name, type/regime toggles, remove -->
      <div style="padding:10px 12px 10px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid ${BD};gap:8px">
        <div style="display:flex;flex-direction:column;gap:2px;padding-top:2px;flex-shrink:0">
          <button onclick="moveEx(${i},-1)" ${isFirst?'disabled':''} style="background:none;border:none;color:${isFirst?BD:DM};font-size:14px;cursor:${isFirst?'default':'pointer'};padding:1px 4px;line-height:1">▲</button>
          <button onclick="moveEx(${i},1)"  ${isLast?'disabled':''} style="background:none;border:none;color:${isLast?BD:DM};font-size:14px;cursor:${isLast?'default':'pointer'};padding:1px 4px;line-height:1">▼</button>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ex.exName)}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
            <button onclick="setExType(${i},'strength')"    style="padding:4px 9px;border-radius:99px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:${isS?'#A32D2D':BG3};color:${isS?TX:DM}">Força</button>
            <button onclick="setExType(${i},'hypertrophy')" style="padding:4px 9px;border-radius:99px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:${isH?CB:BG3};color:${isH?TX:DM}">Hipert.</button>
            <button onclick="setExRegime(${i},'weighted')"   style="padding:4px 9px;border-radius:99px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:${isW?CB:BG3};color:${isW?TX:DM}">Carga</button>
            <button onclick="setExRegime(${i},'assisted')"   style="padding:4px 9px;border-radius:99px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:${isAs?CA:BG3};color:${isAs?TX:DM}">Assist.</button>
            <button onclick="setExRegime(${i},'bodyweight')" style="padding:4px 9px;border-radius:99px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:${isBW?CG:BG3};color:${isBW?TX:DM}">BW</button>
          </div>
        </div>
        <button onclick="rmEx(${i})" style="background:none;border:none;color:${DM};font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;margin-top:-2px;flex-shrink:0">×</button>
      </div>
      <!-- Set rows -->
      <div style="padding:12px 16px">
        ${!ex.sets.length ? `<div style="font-size:13px;color:${DM};margin-bottom:8px">Nenhuma série. Adicione abaixo.</div>` : ''}
        ${setHeader}${setRows}
        ${B(BG3,TX,'+ Série',`addSet(${i})`,';margin-bottom:0;margin-top:4px')}
      </div>
    </div>`;
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  12. TAB: HISTORY (Histórico)
// ║
// ║  Sorted list of saved sessions, newest first.
// ║  Each row is tappable to expand — shows per-exercise set detail.
// ║  Actions: Edit (loads session back into Log tab), Delete.
// ╚══════════════════════════════════════════════════════════════════════════════

function buildHistory() {
  const bkp = `<div style="display:flex;justify-content:flex-end;margin-bottom:16px">${Bs(BG3,DM,'⬆ Backup & Sync','openBackup()')}</div>`;
  if (!D.sessions.length)
    return bkp + `<div style="text-align:center;color:${DM};padding:40px;font-size:14px">Nenhum treino salvo ainda.</div>`;

  const sorted = [...D.sessions].sort((a,b) => b.date.localeCompare(a.date));
  return bkp + `<div style="font-size:18px;font-weight:700;margin-bottom:16px">Histórico</div>` + sorted.map(s => {
    const v  = s.exercises.reduce((a,ex) => a + volEx(ex.sets, ex.regime), 0);
    const ws = s.exercises.reduce((a,ex) => a + (ex.sets||[]).filter(x => x.intent==='work').length, 0);
    const open = EXP === s.id;

    let detail = '';
    if (open) {
      const exRows = s.exercises.map(ex => {
        let wc = 0;
        const lines = (ex.sets||[]).map(set => {
          if (set.intent==='work') wc++;
          const lbl = set.intent==='work' ? `W${wc}` : 'WU';
          const bw  = currentBW();
          const kgLbl = ex.regime==='bodyweight' ? (bw?`${bw}kg (BW)`:'BW')
            : ex.regime==='assisted' ? (bw ? `${set.kg||'–'} assist. (${bw&&set.kg?Math.max(0,bw-Number(set.kg)):'-'}kg real)` : `${set.kg||'–'} assist.`)
            : `${set.kg||'–'} kg`;
          return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid ${BD};font-size:14px">
            <span style="background:${set.intent==='work'?CG:'#555'};color:#fff;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;min-width:34px;text-align:center">${lbl}</span>
            <span>${set.reps||'–'} reps × ${kgLbl}</span>
          </div>`;
        }).join('');
        return `<div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-weight:600">${esc(ex.exName)}</span>${typePill(ex.type)}${ex.regime?regimePill(ex.regime):''}
          </div>${lines}
        </div>`;
      }).join('');

      detail = `<div style="border-top:1px solid ${BD};padding:14px 16px">${exRows}
        <div style="display:flex;gap:8px;margin-top:12px">
          ${Bs(BG3,TX,'Editar',`editSess('${s.id}')`,';flex:1;padding:10px;justify-content:center')}
          ${Bs('#1a0808',CR,'Excluir',`delSess('${s.id}')`,`;flex:1;padding:10px;justify-content:center;border:1px solid #3a1010`)}
        </div>
      </div>`;
    }

    return `<div style="background:${BG2};border:1px solid ${BD};border-radius:10px;margin-bottom:9px;overflow:hidden">
      <div onclick="toggleExp('${s.id}')" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
        <div>
          <div style="font-weight:600">${esc(s.planName||'Treino livre')}</div>
          <div style="font-size:13px;color:${DM}">${fmt(s.date)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:${DM}">${ws} série${ws!==1?'s':''} · ${s.exercises.length} ex.</div>
          ${v>0 ? `<div style="font-size:12px;color:${DM}">${v.toFixed(0)} kg vol.</div>` : ''}
        </div>
      </div>${detail}
    </div>`;
  }).join('');
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  13. TAB: LIBRARY (Biblioteca)
// ║
// ║  Displays all exercises in D.exercises with filtering, search, and A-Z sort.
// ║  Filter bar uses data-* attributes + bindLibraryFilters() after render.
// ║  Search updates the results list in-place (no full re-render) to keep focus.
// ╚══════════════════════════════════════════════════════════════════════════════

function buildLibrary() {
  const missing  = DEFAULTS.filter(d => !D.exercises.find(e => e.name===d.name)).length;
  const total    = D.exercises.length;
  const filtered = applyFilters(D.exercises, _libFType, _libFMove, _libSearch, _libAlpha, _libUnclassed);
  const hasFilter = _libFType || _libFMove || _libSearch || _libUnclassed;
  const countNote = hasFilter
    ? ` — ${filtered.length} ${_libUnclassed?'sem classificação':'resultado'+(filtered.length!==1?'s':'')}`
    : '';

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
      <div>
        <div style="font-size:20px;font-weight:700">Biblioteca</div>
        <div id="lib-count" style="font-size:13px;color:${DM};margin-top:2px">${total} exercício${total!==1?'s':''}${countNote}</div>
      </div>
      ${Bs(CG,TX,'+ Novo','openNewEx()')}
    </div>

    ${missing > 0 ? `
      <div style="background:#0a2e24;border:1px solid #1a5c40;border-radius:10px;padding:12px 14px;margin:14px 0 0;display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div>
          <div style="font-size:13px;color:#6fcf97;font-weight:600;margin-bottom:2px">Biblioteca padrão disponível</div>
          <div style="font-size:12px;color:#4caf7d">${missing} exercício${missing!==1?'s':''} ainda não adicionado${missing!==1?'s':''}</div>
        </div>
        ${Bs(CG,TX,'Carregar','loadDefaults()')}
      </div>` : ''}

    <div style="margin-top:14px">
      <div id="lib-filter-bar">
        ${filterBarHTML(_libFType, _libFMove, _libUnclassed, true)}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="text" placeholder="Buscar por nome..." value="${esc(_libSearch)}"
          oninput="libSearchInput(this.value)"
          style="flex:1;background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 12px;outline:none;box-sizing:border-box">
        <button onclick="libAlphaToggle()" style="padding:9px 13px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_libAlpha?CG:BG3};color:${_libAlpha?TX:DM}">A–Z</button>
      </div>
    </div>

    <div id="lib-results">
      ${!total
        ? `<div style="text-align:center;color:${DM};padding:32px 0;font-size:14px;line-height:1.7">Nenhum exercício cadastrado.<br>Adicione manualmente ou carregue a biblioteca padrão.</div>`
        : !filtered.length
        ? `<div style="text-align:center;color:${DM};padding:32px 0;font-size:14px">Nenhum exercício encontrado.</div>`
        : filtered.map(libExRow).join('')}
    </div>`;
}

// Single exercise row in the library list
function libExRow(ex) {
  return `<div style="background:${BG2};border:1px solid ${BD};border-radius:10px;margin-bottom:7px;padding:12px 14px;display:flex;align-items:center;gap:10px">
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:14px;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ex.name)}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${ex.type?typePill(ex.type):''}
        ${ex.regime?regimePill(ex.regime):''}
        ${compPill(ex.compound!=null?ex.compound:null)}
      </div>
    </div>
    ${Bs(BG3,TX,'Editar',`openEditEx('${ex.id}')`,';padding:6px 10px;font-size:12px')}
    <button onclick="delEx('${ex.id}')" style="background:none;border:none;color:${DM};font-size:22px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0">×</button>
  </div>`;
}

// Attached after render — handles library filter pill clicks
function bindLibraryFilters() {
  bindFilterBar('lib-filter-bar',
    val => { _libFType = _libFType===val?null:val; render(); },
    val => {
      if (val === 'unclassed') { _libUnclassed=!_libUnclassed; if(_libUnclassed)_libFMove=null; }
      else { _libUnclassed=false; _libFMove=_libFMove===val?null:val; }
      render();
    }
  );
}

// Search updates results in-place to preserve input focus
function libSearchInput(v) {
  _libSearch = v;
  const c       = document.getElementById('lib-results');
  const countEl = document.getElementById('lib-count');
  if (!c) return;
  const total    = D.exercises.length;
  const filtered = applyFilters(D.exercises, _libFType, _libFMove, _libSearch, _libAlpha, _libUnclassed);
  const hasFilter = _libFType || _libFMove || _libSearch || _libUnclassed;
  const countNote = hasFilter ? ` — ${filtered.length} ${_libUnclassed?'sem classificação':'resultado'+(filtered.length!==1?'s':'')}` : '';
  if (countEl) countEl.textContent = `${total} exercício${total!==1?'s':''}${countNote}`;
  c.innerHTML = !filtered.length
    ? `<div style="text-align:center;color:${DM};padding:32px 0;font-size:14px">Nenhum exercício encontrado.</div>`
    : filtered.map(libExRow).join('');
}

function libAlphaToggle() { _libAlpha = !_libAlpha; render(); }

function loadDefaults() {
  DEFAULTS.forEach(d => {
    if (!D.exercises.find(e => e.name===d.name))
      D.exercises.push({ id:uid(), name:d.name, type:d.type, compound:d.compound, regime:d.regime });
  });
  persist(); render();
}

// ║  14. TAB: PLANS (Planos)
// ║
// ║  Displays saved training plans.
// ║  Plan editor modal replaces the old <select> dropdown with a full
// ║  search + filter + scrollable exercise picker (same UX as add-exercise).

function buildPlans() {
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:18px;font-weight:700">Planos</div>
      ${Bs(CG,TX,'+ Novo','openNewPlan()')}
    </div>
    ${!D.plans.length
      ? `<div style="text-align:center;color:${DM};padding:40px;font-size:14px">Nenhum plano criado.</div>`
      : D.plans.map(p => {
          const hasList = (p.exercises||[]).length > 0;
          const exList  = (p.exercises||[]).map((exId,idx) => {
            const ex = D.exercises.find(e => e.id===exId);
            return `<div style="padding:6px 0;border-bottom:.5px solid ${BD};font-size:14px;display:flex;align-items:center;gap:6px">
              <span style="color:${DM};min-width:20px">${idx+1}.</span>
              <span style="flex:1">${esc(ex?ex.name:'(removido)')}</span>
              ${ex&&ex.type?typePill(ex.type):''}${ex&&ex.regime?regimePill(ex.regime):''}
            </div>`;
          }).join('');
          return `<div style="background:${BG2};border:1px solid ${BD};border-radius:10px;margin-bottom:10px;overflow:hidden">
            <div style="padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:${hasList?`1px solid ${BD}`:'none'}">
              <span style="font-weight:700;font-size:16px">${esc(p.name)}</span>
              <div style="display:flex;gap:8px">
                ${Bs(BG3,TX,'Editar',`openEditPlan('${p.id}')`)}
                ${Bs(BG3,CR,'×',`delPlan('${p.id}')`)}
              </div>
            </div>
            ${hasList ? `<div style="padding:6px 16px 12px">${exList}</div>` : ''}
          </div>`;
        }).join('')}`;
}

function openNewPlan()   { _planExs=[]; _planId=null; _peFType=null; _peFMove=null; _peSearch=''; _peAlpha=false; showPlanEditor(''); }
function openEditPlan(id){ const p=D.plans.find(x=>x.id===id); if(!p)return; _planId=id; _planExs=[...(p.exercises||[])]; _peFType=null; _peFMove=null; _peSearch=''; _peAlpha=false; showPlanEditor(p.name); }

function showPlanEditor(name) {
  showModal(`
    <div style="font-size:17px;font-weight:700;margin-bottom:14px">${_planId?'Editar plano':'Novo plano'}</div>
    <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Nome do plano</label>
    <input id="plan-name" type="text" placeholder="Ex: Upper A" value="${esc(name)}"
      style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:15px;padding:11px 12px;width:100%;outline:none;margin-bottom:14px;box-sizing:border-box">
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Exercícios em ordem</label>
    <div id="plan-ex-list"></div>
    <div style="height:1px;background:${BD};margin:10px 0 12px"></div>
    <label style="font-size:12px;color:${DM};margin-bottom:8px;display:block">Adicionar ao plano</label>
    <div id="pe-filter-bar">${filterBarHTML(_peFType,_peFMove,false,false)}</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="pe-search" type="text" placeholder="Buscar exercício..."
        style="flex:1;background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 12px;outline:none;box-sizing:border-box">
      <button id="pe-az" style="padding:9px 12px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${BG3};color:${DM}">A–Z</button>
    </div>
    <div id="pe-ex-list" style="height:200px;overflow-y:auto;margin-bottom:14px"></div>
    <div style="height:1px;background:${BD};margin-bottom:14px"></div>
    ${B(CG,TX,'Salvar plano','savePlan()')}
    ${B(BG3,TX,'Cancelar','closeModal()',';margin-bottom:0')}`);

  refreshPlanExList();

  // Attach plan editor search + AZ listeners
  const inp = document.getElementById('pe-search');
  const az  = document.getElementById('pe-az');
  if (inp) inp.addEventListener('input', function() { _peSearch=this.value; peRefreshList(); });
  if (az)  az.addEventListener('click',  function() { _peAlpha=!_peAlpha; this.style.background=_peAlpha?CG:BG3; this.style.color=_peAlpha?TX:DM; peRefreshList(); });

  // Attach plan editor filter bar
  bindFilterBar('pe-filter-bar',
    val => { _peFType=_peFType===val?null:val; peBuildFilterBar(); peRefreshList(); },
    val => { _peFMove=_peFMove===val?null:val; peBuildFilterBar(); peRefreshList(); }
  );

  peRefreshList();
}

function peBuildFilterBar() {
  const c = document.getElementById('pe-filter-bar');
  if (!c) return;
  c.innerHTML = filterBarHTML(_peFType, _peFMove, false, false);
  bindFilterBar('pe-filter-bar',
    val => { _peFType=_peFType===val?null:val; peBuildFilterBar(); peRefreshList(); },
    val => { _peFMove=_peFMove===val?null:val; peBuildFilterBar(); peRefreshList(); }
  );
}

function peRefreshList() {
  const c = document.getElementById('pe-ex-list');
  if (!c) return;
  const filtered = applyFilters(D.exercises, _peFType, _peFMove, _peSearch, _peAlpha, false);
  if (!filtered.length) { c.innerHTML=`<div style="text-align:center;color:${DM};padding:16px 0;font-size:13px">Nenhum exercício encontrado.</div>`; c.scrollTop=0; return; }
  c.innerHTML = filtered.map(ex => `
    <button onclick="addExToPlan('${ex.id}')" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-family:inherit;cursor:pointer;margin-bottom:6px">
      <span style="flex:1;font-weight:500;font-size:13px;text-align:left">${esc(ex.name)}</span>
      <div style="display:flex;gap:4px;flex-shrink:0">${ex.type?typePill(ex.type):''}${ex.regime?regimePill(ex.regime):''}</div>
      <span style="color:${DM};font-size:12px">+</span>
    </button>`).join('');
  c.scrollTop = 0;
}

function refreshPlanExList() {
  const c = document.getElementById('plan-ex-list');
  if (!c) return;
  if (!_planExs.length) { c.innerHTML=`<div style="font-size:13px;color:${DM};margin-bottom:8px">Nenhum exercício adicionado.</div>`; return; }
  c.innerHTML = _planExs.map((exId,i) => {
    const ex = D.exercises.find(e => e.id===exId);
    const isFirst=i===0, isLast=i===_planExs.length-1;
    return `<div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:.5px solid ${BD}">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button onclick="movePlanEx(${i},-1)" ${isFirst?'disabled':''} style="background:none;border:none;color:${isFirst?BD:DM};font-size:13px;cursor:${isFirst?'default':'pointer'};padding:1px 3px;line-height:1">▲</button>
        <button onclick="movePlanEx(${i},1)"  ${isLast?'disabled':''}  style="background:none;border:none;color:${isLast?BD:DM};font-size:13px;cursor:${isLast?'default':'pointer'};padding:1px 3px;line-height:1">▼</button>
      </div>
      <span style="color:${DM};font-size:12px;min-width:18px">${i+1}.</span>
      <span style="flex:1;font-size:14px">${esc(ex?ex.name:'(removido)')}</span>
      ${ex&&ex.type?typePill(ex.type):''}${ex&&ex.regime?regimePill(ex.regime):''}
      <button onclick="rmPlanEx(${i})" style="background:none;border:none;color:${DM};font-size:20px;cursor:pointer;padding:4px">×</button>
    </div>`;
  }).join('');
}

function movePlanEx(i,dir) { const j=i+dir; if(j<0||j>=_planExs.length)return; [_planExs[i],_planExs[j]]=[_planExs[j],_planExs[i]]; refreshPlanExList(); }
function addExToPlan(id)   { if(!id||_planExs.includes(id))return; _planExs.push(id); refreshPlanExList(); }
function rmPlanEx(i)       { _planExs.splice(i,1); refreshPlanExList(); }

function savePlan() {
  const name = (document.getElementById('plan-name')?.value||'').trim();
  if (!name) return;
  if (_planId) { const p=D.plans.find(x=>x.id===_planId); if(p){p.name=name;p.exercises=[..._planExs];} }
  else D.plans.push({ id:uid(), name, exercises:[..._planExs] });
  persist(); closeModal(); render();
}
function delPlan(id) { D.plans=D.plans.filter(p=>p.id!==id); persist(); render(); }

// ║  15. TAB: WEIGHT (Peso Corporal)
// ║
// ║  Simple log of bodyweight over time.
// ║  currentBW() (section 7) reads from this log.
// ║  Used for actual load calculation in assisted and bodyweight exercises.
// ╚══════════════════════════════════════════════════════════════════════════════

function buildWeight() {
  const sorted = [...D.weights].sort((a,b) => b.date.localeCompare(a.date));
  const rows   = sorted.map((w,i) => {
    const prev  = sorted[i+1];
    const delta = prev ? w.kg - prev.kg : null;
    const ds    = delta===null ? ''
      : delta===0 ? `<span style="color:${DM};font-size:12px">→</span>`
      : delta<0   ? `<span style="color:#6fcf97;font-size:12px">▼ ${Math.abs(delta).toFixed(1)}kg</span>`
      :             `<span style="color:#e57373;font-size:12px">▲ ${delta.toFixed(1)}kg</span>`;
    return `<div style="background:${BG2};border:1px solid ${BD};border-radius:10px;margin-bottom:7px;padding:12px 16px;display:flex;align-items:center;gap:10px">
      <div style="flex:1">
        <div style="font-weight:600;font-size:15px">${w.kg} kg</div>
        <div style="font-size:13px;color:${DM};margin-top:2px">${fmt(w.date)}</div>
      </div>
      ${ds}
      <button onclick="delWeight('${w.id}')" style="background:none;border:none;color:${DM};font-size:22px;cursor:pointer;padding:4px;line-height:1">×</button>
    </div>`;
  }).join('');

  return `
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Peso Corporal</div>
    ${sorted.length
      ? `<div style="font-size:13px;color:${DM};margin-bottom:16px">Atual: <strong style="color:${TX}">${sorted[0].kg} kg</strong> · ${fmt(sorted[0].date)}</div>`
      : `<div style="font-size:13px;color:${DM};margin-bottom:16px">Nenhum registro ainda.</div>`}
    ${bwIsStale() ? `<div style="background:#1e1a00;border:1px solid #5a4a00;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:#e6c84a">
      ${!D.weights.length?'Registre seu peso para cálculos de carga em exercícios assistidos e corporais.':'Último registro há mais de 7 dias — atualize seu peso.'}
    </div>` : ''}
    <div style="background:${BG2};border:1px solid ${BD};border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Registrar peso</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="flex:1">
          <label style="font-size:11px;color:${DM};display:block;margin-bottom:4px">Data</label>
          <input id="bw-date" type="date" value="${today()}"
            style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 10px;width:100%;outline:none;box-sizing:border-box">
        </div>
        <div style="flex:1">
          <label style="font-size:11px;color:${DM};display:block;margin-bottom:4px">Peso (kg)</label>
          <input id="bw-val" type="number" inputmode="decimal" step="0.1" placeholder="85.0"
            style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 10px;width:100%;outline:none;box-sizing:border-box">
        </div>
      </div>
      ${B(CG,TX,'Salvar','saveWeight()',';margin-bottom:0')}
    </div>
    ${rows || `<div style="text-align:center;color:${DM};padding:24px 0;font-size:14px">Nenhum registro de peso ainda.</div>`}`;
}

function saveWeight() {
  const d = document.getElementById('bw-date')?.value;
  const v = parseFloat(document.getElementById('bw-val')?.value);
  if (!d || !v || v<=0) return;
  D.weights.push({ id:uid(), date:d, kg:v });
  persist(); render();
}
function delWeight(id) { D.weights=D.weights.filter(w=>w.id!==id); persist(); render(); }

// ║  16. MODAL SYSTEM
// ║
// ║  All modals share the same overlay/box pattern.
// ║  showModal() injects HTML into a fixed overlay appended to body.
// ║  Tapping outside the modal closes it.
// ╚══════════════════════════════════════════════════════════════════════════════

function showModal(html) {
  closeModal();
  const ov  = document.createElement('div');
  ov.id     = 'modal-ov';
  ov.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end`;
  ov.onclick = e => { if (e.target===ov) closeModal(); };
  const box = document.createElement('div');
  box.style.cssText = `background:${BG2};border-radius:10px 10px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;box-sizing:border-box`;
  box.innerHTML = html;
  ov.appendChild(box);
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('modal-ov')?.remove(); }

// ║  17. EXERCISE MODAL (Library: new / edit)
// ║
// ║  Used from the Library tab to create or edit an exercise definition.
// ║  Fields: name, type (strength/hypertrophy), compound/isolation, regime.
// ║  exF() updates button styles in-place without re-rendering the modal.
// ╚══════════════════════════════════════════════════════════════════════════════

function exModalBody(title, nameVal, saveFn, hidden='') {
  return `
    <div style="font-size:17px;font-weight:700;margin-bottom:16px">${title}</div>
    ${hidden}
    <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Nome</label>
    <input id="ex-name" type="text" value="${esc(nameVal)}" placeholder="Ex: Agachamento"
      style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:15px;padding:11px 12px;width:100%;outline:none;margin-bottom:14px;box-sizing:border-box">
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Tipo</label>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button id="ex-s" onclick="exF('type','strength')"    style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newType==='strength'?'#A32D2D':BG3};color:${_newType==='strength'?TX:DM}">Força</button>
      <button id="ex-h" onclick="exF('type','hypertrophy')" style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newType==='hypertrophy'?CB:BG3};color:${_newType==='hypertrophy'?TX:DM}">Hipert.</button>
    </div>
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Movimento</label>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button id="ex-c" onclick="exF('compound',true)"  style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newCompound===true?'#1a1035':BG3};color:${_newCompound===true?'#b39ddb':DM}">Composto</button>
      <button id="ex-i" onclick="exF('compound',false)" style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newCompound===false?'#1e1810':BG3};color:${_newCompound===false?'#d4a96a':DM}">Isolado</button>
    </div>
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Regime padrão</label>
    <div style="display:flex;gap:6px;margin-bottom:20px">
      <button id="ex-w"  onclick="exF('regime','weighted')"   style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newRegime==='weighted'?CB:BG3};color:${_newRegime==='weighted'?TX:DM}">Carga</button>
      <button id="ex-a"  onclick="exF('regime','assisted')"   style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newRegime==='assisted'?CA:BG3};color:${_newRegime==='assisted'?TX:DM}">Assist.</button>
      <button id="ex-bw" onclick="exF('regime','bodyweight')" style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${_newRegime==='bodyweight'?CG:BG3};color:${_newRegime==='bodyweight'?TX:DM}">BW</button>
    </div>
    ${B(CG,TX,'Salvar',saveFn)}
    ${B(BG3,TX,'Cancelar','closeModal()',';margin-bottom:0')}`;
}

// Updates button styles in-place when type/compound/regime is toggled
function exF(field, val) {
  if (field === 'type') {
    _newType = val;
    const s=document.getElementById('ex-s'), h=document.getElementById('ex-h');
    if(s){s.style.background=val==='strength'?'#A32D2D':BG3;s.style.color=val==='strength'?TX:DM;}
    if(h){h.style.background=val==='hypertrophy'?CB:BG3;h.style.color=val==='hypertrophy'?TX:DM;}
  } else if (field === 'compound') {
    _newCompound = val;
    const c=document.getElementById('ex-c'), i=document.getElementById('ex-i');
    if(c){c.style.background=val===true?'#1a1035':BG3;c.style.color=val===true?'#b39ddb':DM;}
    if(i){i.style.background=val===false?'#1e1810':BG3;i.style.color=val===false?'#d4a96a':DM;}
  } else if (field === 'regime') {
    _newRegime = val;
    const w=document.getElementById('ex-w'), a=document.getElementById('ex-a'), b=document.getElementById('ex-bw');
    if(w){w.style.background=val==='weighted'?CB:BG3;w.style.color=val==='weighted'?TX:DM;}
    if(a){a.style.background=val==='assisted'?CA:BG3;a.style.color=val==='assisted'?TX:DM;}
    if(b){b.style.background=val==='bodyweight'?CG:BG3;b.style.color=val==='bodyweight'?TX:DM;}
  }
}

function openNewEx()  { _newType='hypertrophy'; _newCompound=true; _newRegime='weighted'; showModal(exModalBody('Novo exercício','','saveNewEx()')); }
function openEditEx(id) {
  const ex = D.exercises.find(e=>e.id===id); if(!ex)return;
  _newType=ex.type||'hypertrophy'; _newCompound=ex.compound!=null?ex.compound:true; _newRegime=ex.regime||'weighted';
  showModal(exModalBody('Editar exercício', ex.name, 'saveEditEx()', `<input type="hidden" id="edit-ex-id" value="${ex.id}">`));
}
function saveNewEx() {
  const name = (document.getElementById('ex-name')?.value||'').trim(); if(!name)return;
  D.exercises.push({ id:uid(), name, type:_newType, compound:_newCompound, regime:_newRegime });
  persist(); closeModal(); render();
}
function saveEditEx() {
  const id   = document.getElementById('edit-ex-id')?.value;
  const name = (document.getElementById('ex-name')?.value||'').trim();
  if (!id||!name) return;
  const ex = D.exercises.find(e=>e.id===id);
  if (ex) { ex.name=name; ex.type=_newType; ex.compound=_newCompound; ex.regime=_newRegime; }
  persist(); closeModal(); render();
}
function delEx(id) { D.exercises=D.exercises.filter(e=>e.id!==id); persist(); render(); }

// ║  18. ADD EXERCISE MODAL (Session: pick exercise to add)

// ║  Opened during an active session to add an exercise.

function openAddEx() {
  _aFType=null; _aFMove=null; _aSearch=''; _aAlpha=false; _newType='strength';
  showModal(`
    <div style="font-size:17px;font-weight:700;margin-bottom:12px">Adicionar exercício</div>
    <div id="a-filters">${filterBarHTML(_aFType,_aFMove,false,false)}</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="a-search" type="text" placeholder="Buscar por nome..."
        style="flex:1;background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 12px;outline:none;box-sizing:border-box">
      <button id="a-az" style="padding:9px 13px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${BG3};color:${DM}">A–Z</button>
    </div>
    <div id="a-list" style="height:240px;overflow-y:auto;margin-bottom:14px"></div>
    <div style="height:1px;background:${BD};margin-bottom:14px"></div>
    <div style="font-size:11px;font-weight:700;color:${DM};text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Criar novo</div>
    <input id="new-ex-name" type="text" placeholder="Nome do exercício"
      style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:15px;padding:11px 12px;width:100%;outline:none;margin-bottom:10px;box-sizing:border-box">
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="m-str" onclick="setNewType('strength')"    style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:#A32D2D;color:${TX}">Força</button>
      <button id="m-hyt" onclick="setNewType('hypertrophy')" style="flex:1;padding:9px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${BG3};color:${DM}">Hipert.</button>
    </div>
    ${B(CG,TX,'Criar e adicionar','createAndAdd()')}
    ${B(BG3,TX,'Cancelar','closeModal()',';margin-bottom:0')}`);

  // Attach listeners programmatically
  document.getElementById('a-search').addEventListener('input', function() { _aSearch=this.value; aRefreshList(); });
  document.getElementById('a-az').addEventListener('click', function() { _aAlpha=!_aAlpha; this.style.background=_aAlpha?CG:BG3; this.style.color=_aAlpha?TX:DM; aRefreshList(); });
  aBindFilters();
  aRefreshList();
}

function aBindFilters() {
  const c = document.getElementById('a-filters'); if(!c)return;
  c.innerHTML = filterBarHTML(_aFType, _aFMove, false, false);
  bindFilterBar('a-filters',
    val => { _aFType=_aFType===val?null:val; aBindFilters(); aRefreshList(); },
    val => { _aFMove=_aFMove===val?null:val; aBindFilters(); aRefreshList(); }
  );
}

function aRefreshList() {
  const c = document.getElementById('a-list'); if(!c)return;
  const filtered = applyFilters(D.exercises, _aFType, _aFMove, _aSearch, _aAlpha, false);
  if (!filtered.length) { c.innerHTML=`<div style="text-align:center;color:${DM};padding:16px 0;font-size:13px">Nenhum exercício encontrado.</div>`; c.scrollTop=0; return; }
  c.innerHTML = filtered.map(ex => `
    <button onclick="pickEx('${ex.id}')" style="display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-family:inherit;cursor:pointer;margin-bottom:7px">
      <span style="flex:1;font-weight:500;font-size:14px;text-align:left">${esc(ex.name)}</span>
      <div style="display:flex;gap:4px;flex-shrink:0">${ex.type?typePill(ex.type):''}${ex.regime?regimePill(ex.regime):''}</div>
      <span style="color:${DM};font-size:12px">→</span>
    </button>`).join('');
  c.scrollTop = 0;
}

function setNewType(t) {
  _newType=t;
  const s=document.getElementById('m-str'),h=document.getElementById('m-hyt');
  if(s){s.style.background=t==='strength'?'#A32D2D':BG3;s.style.color=t==='strength'?TX:DM;}
  if(h){h.style.background=t==='hypertrophy'?CB:BG3;h.style.color=t==='hypertrophy'?TX:DM;}
}

// Type + regime picker before adding to session
function pickEx(id) {
  const ex = D.exercises.find(e=>e.id===id); if(!ex)return;
  _pickType=ex.type||'hypertrophy'; _pickRegime=ex.regime||'weighted';
  const isS=_pickType==='strength', isW=_pickRegime==='weighted', isAs=_pickRegime==='assisted', isBW=_pickRegime==='bodyweight';
  showModal(`
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">${esc(ex.name)}</div>
    <div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap">${ex.compound!=null?compPill(ex.compound):''}${ex.regime?regimePill(ex.regime):''}</div>
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Tipo neste treino</label>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button id="pt-s" onclick="setPickType('strength')"    style="flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${isS?'#A32D2D':BG3};color:${isS?TX:DM}">Força</button>
      <button id="pt-h" onclick="setPickType('hypertrophy')" style="flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${!isS?CB:BG3};color:${!isS?TX:DM}">Hipert.</button>
    </div>
    <label style="font-size:12px;color:${DM};margin-bottom:6px;display:block">Regime neste treino</label>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="pr-w"  onclick="setPickRegime('weighted')"   style="flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${isW?CB:BG3};color:${isW?TX:DM}">Carga</button>
      <button id="pr-a"  onclick="setPickRegime('assisted')"   style="flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${isAs?CA:BG3};color:${isAs?TX:DM}">Assist.</button>
      <button id="pr-bw" onclick="setPickRegime('bodyweight')" style="flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;background:${isBW?CG:BG3};color:${isBW?TX:DM}">BW</button>
    </div>
    ${B(CG,TX,'Adicionar',`addPickedEx('${id}')`)}
    ${B(BG3,TX,'Voltar','openAddEx()',';margin-bottom:0')}`);
}

function setPickType(t) {
  _pickType=t;
  const s=document.getElementById('pt-s'),h=document.getElementById('pt-h');
  if(s){s.style.background=t==='strength'?'#A32D2D':BG3;s.style.color=t==='strength'?TX:DM;}
  if(h){h.style.background=t==='hypertrophy'?CB:BG3;h.style.color=t==='hypertrophy'?TX:DM;}
}
function setPickRegime(r) {
  _pickRegime=r;
  const w=document.getElementById('pr-w'),a=document.getElementById('pr-a'),b=document.getElementById('pr-bw');
  if(w){w.style.background=r==='weighted'?CB:BG3;w.style.color=r==='weighted'?TX:DM;}
  if(a){a.style.background=r==='assisted'?CA:BG3;a.style.color=r==='assisted'?TX:DM;}
  if(b){b.style.background=r==='bodyweight'?CG:BG3;b.style.color=r==='bodyweight'?TX:DM;}
}

function addPickedEx(exId) {
  const ex = D.exercises.find(e=>e.id===exId); if(!ex||!S)return;
  const o = { exId, exName:ex.name, type:_pickType, compound:ex.compound, regime:_pickRegime, sets:[] };
  o.sets = buildSetsFromMemory(o);
  S.exercises.push(o); closeModal(); render();
}

function createAndAdd() {
  const el   = document.getElementById('new-ex-name');
  const name = (el?el.value:'').trim(); if(!name)return;
  const id   = uid();
  D.exercises.push({ id, name, type:_newType, compound:true, regime:'weighted' });
  if (S) { const o={exId:id,exName:name,type:_newType,compound:true,regime:'weighted',sets:[]}; o.sets=buildSetsFromMemory(o); S.exercises.push(o); }
  persist(); closeModal(); render();
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  19. SESSION ACTIONS
// ║
// ║  Manages the active session (S):
// ║    startPlan()    — loads a plan into S with memory-populated sets
// ║    startFree()    — blank session
// ║    saveSession()  — commits S to D.sessions, rebuilds memory, persists
// ║    editSess()     — loads a saved session back into S for editing
// ║    cancelSession()— discards S
// ║
// ║  Per-set mutations (addSet, rmSet, toggleIntent, setVal) are called
// ║  directly from oninput/onclick attributes in the exercise block HTML.
// ╚══════════════════════════════════════════════════════════════════════════════

function startPlan(id) {
  const p = D.plans.find(x=>x.id===id); if(!p)return;
  S = {
    planId: p.id, planName: p.name, date: today(),
    exercises: (p.exercises||[]).map(exId => {
      const ex = D.exercises.find(e=>e.id===exId);
      const o  = { exId, exName:ex?ex.name:'?', type:ex?.type||'hypertrophy', compound:ex?.compound, regime:ex?.regime||'weighted', sets:[] };
      o.sets   = buildSetsFromMemory(o);
      return o;
    })
  };
  render();
}

function startFree()     { S={ planId:null, planName:null, date:today(), exercises:[] }; render(); }
function cancelSession() { S=null; render(); }

function saveSession() {
  if (!S||!S.exercises.length) return;
  const rec = { id:S._editId||uid(), date:S.date, planId:S.planId, planName:S.planName, exercises:S.exercises };
  if (S._editId) { const i=D.sessions.findIndex(s=>s.id===S._editId); if(i>=0)D.sessions[i]=rec; }
  else D.sessions.push(rec);
  rebuildMemory(); persist(); S=null; TAB='history'; render();
}

function editSess(id) {
  const s = D.sessions.find(x=>x.id===id); if(!s)return;
  S = { ...s, exercises:s.exercises.map(ex=>({...ex,sets:ex.sets.map(set=>({...set}))})), _editId:s.id };
  TAB='log'; EXP=null; render();
}

function delSess(id)     { D.sessions=D.sessions.filter(s=>s.id!==id); EXP=null; rebuildMemory(); persist(); render(); }
function toggleExp(id)   { EXP=EXP===id?null:id; render(); }

// Per-set mutations — called from inline event handlers in buildExBlock()
function addSet(i)            { S.exercises[i].sets.push({intent:'work',reps:'',kg:'',refReps:null,refKg:null}); render(); }
function rmSet(i,j)           { S.exercises[i].sets.splice(j,1); render(); }
function toggleIntent(i,j)    { const s=S.exercises[i].sets[j]; s.intent=s.intent==='work'?'warmup':'work'; render(); }
function setVal(i,j,f,v)      { const s=S.exercises[i].sets[j]; s[f]=f==='reps'?(parseInt(v)||''):(parseFloat(v)||''); }

// Type/regime changes re-run auto-population from memory
function setExType(i,t)       { S.exercises[i].type=t;   S.exercises[i].sets=buildSetsFromMemory(S.exercises[i]); render(); }
function setExRegime(i,r)     { S.exercises[i].regime=r; S.exercises[i].sets=buildSetsFromMemory(S.exercises[i]); render(); }
function moveEx(i,dir)        { const j=i+dir; if(!S||j<0||j>=S.exercises.length)return; [S.exercises[i],S.exercises[j]]=[S.exercises[j],S.exercises[i]]; render(); }
function rmEx(i)              { S.exercises.splice(i,1); render(); }


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  20. BACKUP & SYNC MODAL
// ║
// ║  Three sections in one modal:
// ║    · GitHub Gist config — token + gistId, save & sync, force pull
// ║    · Export — copy JSON to clipboard or download as file
// ║    · Import — paste JSON to restore data
// ╚══════════════════════════════════════════════════════════════════════════════

function openBackup() {
  const date     = today();
  const fn       = `gym-tracker-${date}.json`;
  const json     = JSON.stringify(D, null, 2);
  const syncMsg  = !CFG.token                   ? 'GitHub não configurado'
    : _syncStatus?.state==='ok'                  ? `✓ Sincronizado · ${fmtTime(_syncStatus.time)}`
    : _syncStatus?.state==='error'               ? '⚠ Erro de sincronização'
    : _syncStatus?.state==='syncing'             ? '🔄 Sincronizando...'
    :                                              'Aguardando primeira sincronização';

  showModal(`
    <div style="font-size:17px;font-weight:700;margin-bottom:16px">Backup & Sync</div>

    <!-- GitHub Gist -->
    <div style="background:${BG3};border:1px solid ${BD};border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:4px">GitHub Gist Sync</div>
      <div style="font-size:12px;color:${DM};margin-bottom:12px">${syncMsg}</div>
      <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Personal Access Token</label>
      <input id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${esc(CFG.token)}"
        style="background:${BG2};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 12px;width:100%;outline:none;margin-bottom:8px;box-sizing:border-box">
      <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Gist ID <span style="font-weight:400">(deixe em branco para criar novo)</span></label>
      <input id="gh-gist" type="text" placeholder="Preenchido automaticamente" value="${esc(CFG.gistId)}"
        style="background:${BG2};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:14px;padding:9px 12px;width:100%;outline:none;margin-bottom:10px;box-sizing:border-box">
      <div style="display:flex;gap:8px">
        ${Bs(CG,TX,'Salvar e sincronizar','saveGithubConfig()',';flex:1;justify-content:center;padding:10px')}
        ${Bs(BG2,TX,'↓ Forçar download','gistPull()',`;flex:1;justify-content:center;padding:10px;border:1px solid ${BD}`)}
      </div>
    </div>

    <!-- Export -->
    <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Exportar — ${fn}</label>
    <textarea id="exp-area" readonly onclick="this.select()"
      style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:11px;padding:10px 12px;width:100%;outline:none;margin-bottom:8px;box-sizing:border-box;height:90px;font-family:monospace;resize:none;line-height:1.4">${esc(json)}</textarea>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="copy-btn" onclick="copyBackup()" style="flex:1;padding:10px;border:none;border-radius:8px;background:${BG3};color:${TX};font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">Copiar JSON</button>
      <button onclick="downloadBackup('${fn}')" style="flex:1;padding:10px;border:none;border-radius:8px;background:${BG3};color:${TX};font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">⬇ Baixar</button>
    </div>

    <!-- Import -->
    <label style="font-size:12px;color:${DM};margin-bottom:5px;display:block">Importar — cole um backup</label>
    <textarea id="imp-area" placeholder="Cole o JSON aqui..."
      style="background:${BG3};border:1px solid ${BD};border-radius:8px;color:${TX};font-size:11px;padding:10px 12px;width:100%;outline:none;margin-bottom:8px;box-sizing:border-box;height:80px;font-family:monospace;resize:none;line-height:1.4"></textarea>
    <div id="imp-err" style="font-size:12px;color:${CR};margin-bottom:8px;display:none">JSON inválido — verifique o conteúdo.</div>
    ${B(CG,TX,'Importar e substituir dados','importBackup()')}
    ${B(BG3,TX,'Fechar','closeModal()',';margin-bottom:0')}`);
}

async function saveGithubConfig() {
  CFG.token  = (document.getElementById('gh-token')?.value||'').trim();
  CFG.gistId = (document.getElementById('gh-gist')?.value||'').trim();
  await saveConfig();
  closeModal();
  if (CFG.token) { setSyncStatus('syncing'); await gistSave(); render(); }
}

function copyBackup() {
  const ta=document.getElementById('exp-area'), btn=document.getElementById('copy-btn');
  if(!ta)return; ta.select();
  try { document.execCommand('copy'); if(btn){btn.textContent='✓ Copiado!'; setTimeout(()=>{if(btn)btn.textContent='Copiar JSON';},2000);} } catch(e){}
}
function downloadBackup(fn) {
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fn;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function importBackup() {
  const ta=document.getElementById('imp-area'), err=document.getElementById('imp-err');
  const json=(ta?ta.value:'').trim(); if(!json)return;
  try {
    const p=JSON.parse(json);
    if(!Array.isArray(p.exercises)||!Array.isArray(p.plans)||!Array.isArray(p.sessions)) throw new Error();
    applyData(p); persist(); closeModal(); render();
  } catch(e) { if(err)err.style.display='block'; }
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  21. PWA — Progressive Web App
// ║
// ║  Registers the service worker (sw.js) which enables:
// ║    · Offline use (cached assets)
// ║    · "Add to Home Screen" on iOS/Android as a proper app icon
// ║
// ║  Requires manifest.json and sw.js alongside index.html in the repo.
// ╚══════════════════════════════════════════════════════════════════════════════

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}


// ╔══════════════════════════════════════════════════════════════════════════════
// ║  22. INIT — entry point
// ║
// ║  loadData() kicks off the full load sequence (see section 5):
// ║    1. Load config (token, gistId) from localStorage / window.storage
// ║    2. Load local data → render immediately
// ║    3. Fetch Gist in background → merge → re-render if newer
// ╚══════════════════════════════════════════════════════════════════════════════

loadData();

</script>
